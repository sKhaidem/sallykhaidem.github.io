<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Equipment Explorer</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header><h1>Computational Imaging Equipment Explorer</h1>
<p>Hover (desktop) or tap (mobile) a marker.</p></header>

<div class="toolbar">
<input id="search" placeholder="Search equipment...">
<div id="chips"></div>
</div>

<div class="layout">
<div class="image-panel" id="panel">
<img src="images/equipment.jpg" alt="equipment">

<button class="spot" data-id="event" style="left:48%;top:33%;">1</button>
<button class="spot" data-id="lightfield" style="left:21%;top:10%;">2</button>
<button class="spot" data-id="dslr" style="left:4%;top:7%;">3</button>
<button class="spot" data-id="vr" style="left:84%;top:66%;">4</button>

<div class="hint">Move over the image to reveal markers</div>
</div>

<aside class="card" id="card">
<h2>Select a device</h2>
<p>Choose a hotspot to explore.</p>
</aside>
</div>

<div id="sheet" class="sheet"></div>

<script src="js/equipment.js"></script>
<script src="js/app.js"></script>
</body>
</html>
